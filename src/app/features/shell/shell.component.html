<header class="topbar">
  <a routerLink="/dashboard" class="brand">Report portal</a>
  <nav class="nav nav--top" aria-label="Primary" (mouseleave)="closeDropdownOnLeave()">
    @for (item of menu | async; track item.label) {
      @if (isDropdown(item)) {
        <div 
          class="dropdown" 
          [class.open]="isDropdownOpen(item.label)"
          (mouseenter)="openDropdownOnHover(item.label)"
          (mouseleave)="closeDropdownOnLeave()"
          (focusin)="openDropdownOnHover(item.label)"
          (focusout)="closeDropdownOnLeave()"
        >
          <button type="button" class="dropdown-toggle" (click)="toggle(item.label)">
            @if (item.icon) {
              <span class="icon" [attr.data-icon]="item.icon"></span>
            }
            {{ item.label }}
            <span class="caret" aria-hidden="true"></span>
          </button>
          <div class="dropdown-panel" role="menu">
            @for (child of item.children!; track child.routerLink) {
              <a
                role="menuitem"
                [routerLink]="child.routerLink"
                routerLinkActive="active"
                (click)="onMenuLinkClick()"
              >
                @if (child.icon) {
                  <span class="icon" [attr.data-icon]="child.icon"></span>
                }
                {{ child.label }}
              </a>
            }
          </div>
        </div>
      } @else {
        <a [routerLink]="item.routerLink" routerLinkActive="active" (click)="onMenuLinkClick()">
          @if (item.icon) {
            <span class="icon" [attr.data-icon]="item.icon"></span>
          }
          {{ item.label }}
        </a>
      }
    }
  </nav>
  <div class="spacer"></div>
  <div class="meta">
    <span class="user">{{ username() }}</span>
    <span class="roles" [title]="rolesLabel()">{{ rolesLabel() }}</span>
  </div>
  <button type="button" class="ghost" (click)="logout()">Sign out</button>
</header>

<div class="layout no-sidebar">
  <main class="main">
    <router-outlet></router-outlet>
  </main>
</div>
